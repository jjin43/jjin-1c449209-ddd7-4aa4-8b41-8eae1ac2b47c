<div class="flex min-h-screen flex-col px-6 py-8 lg:px-8 bg-white dark:bg-gray-800">
  <div class="flex justify-between items-center mb-8">
    <div class="text-2xl font-semibold text-gray-900 dark:text-gray-100">Audit Log</div>
    <div>
      <button (click)="goBack()" class="text-white bg-gray-600 hover:bg-gray-700 px-3 py-1 rounded">Back</button>
    </div>
  </div>

  <div *ngIf="loading" class="text-gray-700 dark:text-gray-200">Loading...</div>
  <div *ngIf="error" class="text-red-600">{{ error }}</div>

  <div *ngIf="!loading && entries.length" class="overflow-auto">
    <table class="min-w-full text-left border-collapse">
      <thead>
        <tr class="text-sm font-medium text-gray-700 dark:text-gray-200">
          <th class="px-3 py-2">Time</th>
          <th class="px-3 py-2">User</th>
          <th class="px-3 py-2">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let e of entries" class="border-t">
          <td class="px-3 py-2 text-sm text-gray-600 dark:text-gray-300">{{ e.createdAt || e.timestamp || '' }}</td>
          <td class="px-3 py-2 text-sm text-gray-600 dark:text-gray-300">{{ e.user?.email || e.userEmail || e.userId }}</td>
          <td class="px-3 py-2 text-sm text-gray-600 dark:text-gray-300">{{ e.action }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!loading && !entries.length" class="text-gray-700 dark:text-gray-200">No audit events found.</div>
</div>
