<div class="flex min-h-screen flex-col justify-center px-6 py-12 lg:px-8 bg-white dark:bg-gray-800">
  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-gray-900 dark:text-white">Sign in to your account</h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form (ngSubmit)="submit()">
      <div>
        <label for="email" class="block text-sm/6 font-medium text-gray-700 dark:text-gray-100">Email address</label>
        <div class="mt-2">
          <input id="email" type="email" name="email" required autocomplete="email" [(ngModel)]="email" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-gray-900 dark:text-white placeholder:text-gray-500 sm:text-sm/6 border-2 border-gray-200 dark:border-transparent focus:border-indigo-600 dark:focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-0 outline-none" />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label for="password" class="block text-sm/6 font-medium text-gray-700 dark:text-gray-100">Password</label>
        </div>
        <div class="mt-2">
          <input id="password" type="password" name="password" required autocomplete="current-password" [(ngModel)]="password" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-gray-900 dark:text-white placeholder:text-gray-500 sm:text-sm/6 border-2 border-gray-200 dark:border-transparent focus:border-indigo-600 dark:focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-0 outline-none" />
        </div>
      </div>

      <div>
        <button type="submit" class="mt-8 flex w-full justify-center rounded-md bg-indigo-500 px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Sign in</button>
      </div>
      <div *ngIf="error" class="mt-2 text-sm text-red-400">{{ error }}</div>
      </form>
    </div>
    </div>
