<div class="flex min-h-screen flex-col px-6 py-8 lg:px-8 bg-white dark:bg-gray-800">
  <div class="flex justify-between items-center mb-8">
    <div class="text-2xl font-semibold underline underline-offset-3 decoration-8 decoration-brand text-gray-900 dark:text-gray-100">Tasks Dashboard</div>
    <div>
      <button *ngIf="currentUser?.role === 'ADMIN' || currentUser?.role === 'OWNER'" (click)="goAudit()" class="text-white bg-purple-600 box-border border border-transparent hover:bg-purple-700 focus:ring-4 focus:ring-purple-300 shadow-xs font-medium leading-5 rounded-full text-sm px-4 py-2.5 focus:outline-none mr-2">Audit Log</button>
      <button (click)="doLogout()" class="text-white bg-red-600 box-border border border-transparent hover:bg-red-700 focus:ring-4 focus:ring-red-300 shadow-xs font-medium leading-5 rounded-full text-sm px-4 py-2.5 focus:outline-none">Logout</button>
    </div>
  </div>
  <div class="flex gap-4 mb-4 items-center">
    <div class="flex items-center gap-4">
      <!-- Pie chart -->
      <div class="w-28 h-28 flex flex-col items-center justify-center">
        <svg viewBox="0 0 100 100" class="w-24 h-24">
          <ng-container *ngFor="let s of pieSlices">
            <circle *ngIf="s.isCircle" cx="50" cy="50" r="40" [attr.fill]="s.color"></circle>
            <path *ngIf="!s.isCircle" [attr.d]="s.d" [attr.fill]="s.color"></path>
          </ng-container>
          <circle *ngIf="pieSlices.length === 0" cx="50" cy="50" r="40" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"></circle>
        </svg>
        <div class="text-xs text-center text-gray-700 dark:text-gray-200 mt-1">{{ tasks.length }} tasks</div>
      </div>
    </div>
    <div class="flex-1 flex gap-4 items-center">
      <input [(ngModel)]="filter" (ngModelChange)="applyColumns()" placeholder="Search Task" class="border border-gray-300 dark:border-gray-600 p-2 rounded flex-1 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100" />
      <select [(ngModel)]="categoryFilter" (ngModelChange)="applyColumns()" class="border border-gray-300 dark:border-gray-600 p-2 rounded bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
        <option value="">All categories</option>
        <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
      </select>
      <button (click)="openCreate()" class="bg-green-500 hover:bg-green-600 text-white px-3 py-2 rounded">New Task</button>
    </div>
  </div>

  <div class="grid grid-cols-3 gap-4" cdkDropListGroup>
    <ng-container *ngFor="let col of cols">
      <div>
        <h3 class="font-semibold mb-2 text-gray-900 dark:text-gray-100">{{ col.label }}</h3>
        <div
          cdkDropList
          [id]="col.status"
          [cdkDropListConnectedTo]="connectedIds"
          [cdkDropListData]="col.tasks"
          class="min-h-[400px] p-2 bg-white dark:bg-gray-800 rounded shadow border-4 border-black dark:border-gray-400"
          (cdkDropListDropped)="drop($event, col.status)"
        >
          <div *ngFor="let t of col.tasks" cdkDrag [cdkDragDisabled]="!t.canEdit" class="p-2 mb-2 border rounded ring-1" [ngClass]="{ 'border-gray-200 ring-gray-200 bg-gray-50 dark:border-gray-400 dark:ring-gray-700 dark:bg-gray-700': t.canEdit, 'border-gray-200 ring-gray-200 bg-gray-200 opacity-70 dark:border-gray-600 dark:ring-gray-700 dark:bg-gray-600 dark:opacity-70': !t.canEdit }">
            <div class="flex justify-between">
              <div>
                <div class="font-medium text-gray-900 dark:text-gray-100">{{ t.title }}</div>
                <div class="text-xs text-gray-500 dark:text-gray-300">{{ t.category }}</div>
              </div>
              <div class="flex gap-2">
                <button *ngIf="t.canEdit" (click)="edit(t)" class="text-sm text-blue-600 dark:text-blue-400">Edit</button>
                <button *ngIf="t.canDelete" (click)="remove(t)" class="text-sm text-red-600 dark:text-red-400">Delete</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </ng-container>
  </div>

  <!-- edit modal (simple inline) -->
  <div *ngIf="editing" class="fixed inset-0 flex items-center justify-center bg-black/40">
    <div class="bg-white p-4 rounded w-96">
      <h3 class="font-semibold mb-2">Edit Task</h3>
      <input [(ngModel)]="editing.title" class="border p-2 w-full mb-2" />
      <select [(ngModel)]="editing.category" class="border p-2 w-full mb-2">
        <option>Work</option>
        <option>Personal</option>
      </select>
      <label class="text-sm mb-1 block">Grant permissions to (emails, comma separated)</label>
      <input [(ngModel)]="editingPermEmails" placeholder="user@example.com, other@domain" class="border p-2 w-full mb-2" />
      <div class="flex gap-2 items-center mb-2">
        <label class="flex items-center gap-2"><input type="checkbox" [(ngModel)]="editingPermCanEdit" /> Can Edit</label>
        <label class="flex items-center gap-2"><input type="checkbox" [(ngModel)]="editingPermCanDelete" /> Can Delete</label>
      </div>
      <div class="flex justify-end gap-2">
        <button (click)="saveEdit()" class="bg-blue-600 text-white px-3 py-1 rounded">Save</button>
        <button (click)="cancelEdit()" class="px-3 py-1 rounded">Cancel</button>
      </div>
    </div>
  </div>
  
  <!-- create modal -->
  <div *ngIf="showCreate" class="fixed inset-0 flex items-center justify-center bg-black/40">
    <div class="bg-white p-4 rounded w-96">
      <h3 class="font-semibold mb-2">Create Task</h3>
      <input [(ngModel)]="newTitle" placeholder="Title" class="border p-2 w-full mb-2" />
      <select [(ngModel)]="newCategory" class="border p-2 w-full mb-2">
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
      </select>
      <label class="text-sm mb-1 block">Grant permissions to (emails, comma separated)</label>
      <input [(ngModel)]="newPermEmails" placeholder="user@example.com, other@domain" class="border p-2 w-full mb-2" />
      <div class="flex gap-2 items-center mb-2">
        <label class="flex items-center gap-2"><input type="checkbox" [(ngModel)]="newPermCanEdit" /> Can Edit</label>
        <label class="flex items-center gap-2"><input type="checkbox" [(ngModel)]="newPermCanDelete" /> Can Delete</label>
      </div>
      <div class="flex justify-end gap-2">
        <button (click)="create()" class="bg-blue-600 text-white px-3 py-1 rounded">Create</button>
        <button (click)="closeCreate()" class="px-3 py-1 rounded">Cancel</button>
      </div>
    </div>
  </div>
</div>
